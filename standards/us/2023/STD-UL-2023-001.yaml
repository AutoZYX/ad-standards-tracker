summary_en: 'Edition 3 updates: autonomous trucking coverage, refined Safety Performance Indicators (SPIs), new requirements
  for post-incident behavior. Goal-based and technology-agnostic standard by Prof. Phil Koopman (CMU) and colleagues.'
