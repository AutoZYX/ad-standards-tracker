summary_en: Federal recall of 950 Cruise Robotaxis following the October 2023 pedestrian dragging incident in San Francisco.
  Firmware update changes post-collision behavior to avoid secondary harm. Coupled with CA DMV suspension.
summary_cn: 2023 年 10 月旧金山行人拖拽事件后，对 950 辆 Cruise Robotaxi 的联邦召回。固件升级改变事故后行为以避免二次伤害。同步触发加州 DMV 的运营许可吊销。
impact_note: Landmark federal enforcement. Ended Cruise's mainstream Robotaxi business. ROAM-2023-001 incident directly linked.
