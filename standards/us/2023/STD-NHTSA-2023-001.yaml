title_en: Cruise Recall 23E-0062 — All Robotaxi Fleet due to Post-Crash Response Behavior
title_cn: Cruise 召回 23E-0062 因事故后处置行为缺陷召回全部 Robotaxi 车队
url: https://www.nhtsa.gov/recalls
effective_date: '2023-11-08'
automation_level:
- L4
