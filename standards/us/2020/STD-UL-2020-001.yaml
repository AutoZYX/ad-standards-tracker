id: STD-UL-2020-001
date: '2020-04-01'
org: UL
org_full: UL Standards & Engagement
jurisdiction: us
type: standard
status: in_force
title_en: UL 4600 — Standard for Safety for the Evaluation of Autonomous Products
title_cn: UL 4600 自动驾驶产品安全评估标准
url: https://ulse.org/ul-standards-engagement/autonomous-vehicles
automation_level:
- L4
- L5
topics:
- functional_safety
- sotif
- operations
summary_en: The first safety case standard explicitly designed for fully autonomous
  products. Goal-based rather than prescriptive. Addresses fully autonomous operation
  without human driver as primary use case. First published 2020; revised periodically.
summary_cn: 首个明确面向全自动驾驶产品的安全案例（Safety Case）标准。目标导向而非规定式。以无人驾驶操作为主要用例。2020 年首发，定期修订。
impact_note: Referenced by Nuro, Motional, Aurora safety cases. Complements ISO 26262
  / 21448 rather than replacing them.
related_standards:
- ISO 26262
- ISO 21448
- ISO 34502
last_updated: '2026-04-16'
