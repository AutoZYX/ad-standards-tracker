status: draft
title_en: IEEE P3128 — Standard for Teleoperation of Automated Vehicles
title_cn: IEEE P3128 自动驾驶车辆远程操作标准（起草中）
url: https://standards.ieee.org/ieee/3128/11516/
automation_level:
- L4
topics:
- teleoperation
- cybersecurity
summary_en: Draft standard for teleoperation of automated vehicles. Covers tele-driving, tele-assistance, and tele-monitoring
  modes. Defines latency, video quality, operator qualification, cybersecurity requirements.
summary_cn: 起草中的自动驾驶车辆远程操作标准，覆盖远程驾驶、远程辅助、远程监控三种模式。定义延迟、视频质量、操作员资质、网络安全要求。
impact_note: Directly relevant to Robotaxi industry. Likely template for Chinese GB/T teleoperation standard.
related_standards:
- ISO 4448
- UN-R168 (future)
