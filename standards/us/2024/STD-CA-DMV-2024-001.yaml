summary_en: California's proposed framework for permitting autonomous trucks (Class 8) on public roads. Defines testing requirements,
  insurance thresholds, operational design domain restrictions.
summary_cn: 加州对 8 级自动驾驶卡车在公开道路测试部署的提议框架，定义测试要求、保险门槛、运行设计域限制。
impact_note: Opens California to autonomous trucking (previously excluded). Affects Kodiak, Waymo Via, Aurora, TuSimple.
