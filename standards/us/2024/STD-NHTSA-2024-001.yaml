summary_en: Final rule mandating AEB with pedestrian detection on all new light vehicles in the US, with aggressive performance
  requirements (up to 62 mph in vehicle-to-vehicle, 45 mph pedestrian detection at night). Effective September 2029.
summary_cn: 强制所有在美销售的新轻型车配备含行人检测功能的 AEB，性能要求严格（车对车最高 62 mph，夜间行人检测 45 mph）。2029 年 9 月生效。
impact_note: Most aggressive AEB mandate globally. Affects all OEMs selling in US, including Chinese brands entering US market.
