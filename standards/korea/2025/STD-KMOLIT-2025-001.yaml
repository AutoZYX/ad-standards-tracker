summary_en: Draft presidential decree establishing operational standards for L4 commercial
  services in Korea. Covers teleoperation infrastructure, data recorder (DSSAD) requirements,
  incident reporting, minimum risk conditions.
summary_cn: 为韩国 L4 商业服务制定运营标准的总统令草案。涵盖远程操控基础设施、数据记录仪（DSSAD）要求、事件报告、最小风险条件。
impact_note: ⚠️[请核实：总统令草案发布日期]。紧随 2020 年 AV 商业化法律，首批真正落地 L4 的细则。
