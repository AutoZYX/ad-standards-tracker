summary_en: World's first national-level L4 regulation. Defines Technical Supervisor
  role (not a driver but remote oversight), authorization for driverless operation
  in Operational Design Areas (ODA), liability framework. Enables services like MOIA,
  HOLON, Continental.
summary_cn: 全球首部国家级 L4 法规。定义技术监督员（非驾驶员但承担远程监督）角色、运行设计区域（ODA）内无人驾驶授权、责任框架。支持 MOIA、HOLON、Continental
  等服务。
impact_note: UK Automated Vehicles Act 2024 和中国地方立法的参考对象。技术监督员概念是远程运营合规的原型。
related_standards:
