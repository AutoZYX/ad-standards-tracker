summary_en: >-
  Annual update of Euro NCAP's Assisted Driving Grading (ADG). Increases weight of Driver Monitoring
  Systems (DMS), adds corner-case scenarios for take-over request timing, penalizes systems that
  fail to disengage on persistent hand-off-wheel.
summary_cn: Euro NCAP 辅助驾驶测评（ADG）年度更新。加大驾驶员监控系统（DMS）权重，新增接管请求时机的边角案例场景，惩罚在持续脱手条件下未禁用的系统。
impact_note: 与中国 MIIT 组合驾驶辅助强标方向一致（均强调驾驶员状态监测+滥用防护）。ADG 已成为欧洲 OEM 产品规划的关键指标。
