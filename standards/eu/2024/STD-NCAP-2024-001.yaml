summary_en: Euro NCAP's 2026 rating scheme increases weighting on 'Safe Driving' (ADAS/AD) from 25% to 30%. Introduces new
  categories for AD consumer assessment effective 2026 model year onward.
summary_cn: Euro NCAP 2026 评分方案将'安全驾驶'（ADAS/AD）权重从 25% 提升到 30%，自 2026 年款车型起引入新的 AD 消费者评估类别。
impact_note: Direct financial incentive for OEMs to deploy advanced L2+ features. All major Chinese OEMs targeting EU affected.
