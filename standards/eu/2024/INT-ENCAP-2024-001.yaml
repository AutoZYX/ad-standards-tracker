summary_en: >-
  Euro NCAP Vision 2030 sets the roadmap for the 2026-2030 rating framework and signals a stronger
  focus on active safety, assisted driving, automated driving readiness, driver monitoring, and
  vulnerable road user protection.
summary_cn: >-
  Euro NCAP Vision 2030 给出了 2026-2030 年评分体系路线图，强化主动安全、辅助驾驶、自动驾驶就绪性、驾驶员监控和弱势道路使用者保护等方向。
impact_note: >-
  This is a roadmap and policy signal, not a standalone test protocol. Use it to understand Euro
  NCAP direction; use protocol pages for concrete test requirements.
