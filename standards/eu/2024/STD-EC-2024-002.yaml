title_en: Regulation (EU) 2024/1689 — Artificial Intelligence Act (AI Act)
title_cn: 欧盟法规 (EU) 2024/1689 — 人工智能法案
url: https://eur-lex.europa.eu/eli/reg/2024/1689/oj
automation_level:
