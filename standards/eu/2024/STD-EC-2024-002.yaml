summary_en: >-
  EU AI Act establishes risk-based regulatory framework for AI systems. Safety components of
  automated vehicles classified as high-risk AI systems subject to conformity assessment, data
  governance, human oversight requirements.
summary_cn: 欧盟 AI 法案建立基于风险的 AI 系统监管框架。自动驾驶车辆的安全组件被归类为高风险 AI 系统，须通过符合性评估、数据治理、人为监督等要求。
impact_note: >-
  First comprehensive horizontal AI regulation globally. Phased implementation through 2027.
  Significant compliance impact on AD perception and planning stacks.
