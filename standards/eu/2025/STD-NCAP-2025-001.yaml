summary_en: Roadmap expanding from ADAS-focused L2 assessment to Automated Driving Assessment (ADA) for L3 systems. New test
  scenarios for minimum risk maneuver, fallback behavior, driver takeover.
summary_cn: 从专注 L2 辅助驾驶测评扩展到针对 L3 系统的自动驾驶评估。新增最小风险策略、失效回退、驾驶员接管等测试场景。
impact_note: Will shape the next wave of consumer-facing AD metrics globally. C-NCAP and i-VISTA expected to follow.
