title_en: Euro NCAP Roadmap 2026-2030 — Adding Automated Driving assessment
title_cn: Euro NCAP 2026-2030 路线图：纳入自动驾驶评估
url: https://www.euroncap.com/en/press-media/press-releases/
effective_date: '2026-01-01'
automation_level:
- L2
