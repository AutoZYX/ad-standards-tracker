summary_en: Key 5GAA reference document defining C-V2X use cases (cooperative awareness,
  intersection, VRU, platooning, cooperative maneuvers, teleoperation) with corresponding
  latency/reliability/throughput requirements. Input to 3GPP C-V2X specs.
