status: in_force
title_en: VDA ISA / TISAX — Trusted Information Security Assessment Exchange
title_cn: VDA ISA / TISAX — 可信信息安全评估交换
url: https://portal.enx.com/en-US/TISAX/downloads/
automation_level:
  - L0
