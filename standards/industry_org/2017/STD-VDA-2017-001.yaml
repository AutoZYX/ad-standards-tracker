summary_en: >-
  De-facto info-security assessment standard for automotive supply chain. Based on ISO/IEC 27001 but
  tailored for automotive needs (prototype protection, data handling for connected vehicles).
  Managed by ENX Association.
summary_cn: 汽车供应链信息安全事实评估标准。基于 ISO/IEC 27001 但针对汽车行业定制（原型保护、网联车辆数据处理）。由 ENX 协会管理。
impact_note: >-
  大多数 OEM 要求 Tier 1/2 供应商达到 TISAX 认证。与 ISO/SAE 21434 cybersecurity engineering
  互为补充（一个是过程认证，一个是工程过程）。
related_standards:
  - ISO/IEC 27001
  - ISO/SAE 21434
  - UN-R155
