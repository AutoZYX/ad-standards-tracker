summary_en: Singapore's Technical Reference 68 (TR 68) — a phased milestone-based
  AV testing and deployment framework. Covers sensors, vehicle behavior, cybersecurity,
  data. Reference for ASEAN countries.
summary_cn: 新加坡 Technical Reference 68（TR 68）— 分阶段里程碑式 AV 测试部署框架。涵盖传感器、车辆行为、网络安全、数据。是东盟国家的参考。
impact_note: 亚洲较早形成体系化 AV 部署技术参考的国家级框架之一，覆盖基础行为、安全、网络安全和数据格式，适合作为 ASEAN 区域参考。
