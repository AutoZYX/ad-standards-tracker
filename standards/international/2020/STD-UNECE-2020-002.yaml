summary_en: >-
  Mandates AEB for passenger cars (M1) and light commercial vehicles (N1) in UNECE contracting
  parties. Covers car-to-car (C2C), car-to-pedestrian (C2P), car-to-cyclist (C2C) scenarios. Speed
  range expanded through amendments.
summary_cn: 强制 UNECE 缔约方的乘用车（M1）和轻型商用车（N1）装备 AEB。覆盖车对车（C2C）、车对行人（C2P）、车对自行车（C2C）场景。通过多轮修订扩展了速度范围。
impact_note: >-
  Foundational active safety regulation. Basis for C-NCAP AEB scenarios and forthcoming China GB AEB
  mandatory standard.
related_standards:
  - Euro NCAP AEB
  - C-NCAP 2024
  - China GB AEB (upcoming)
