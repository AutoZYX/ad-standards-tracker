title_en: "ISO 21448:2022 — Road vehicles — Safety of the intended functionality (SOTIF)"
title_cn: "ISO 21448:2022 道路车辆 预期功能安全"
url: "https://www.iso.org/standard/77490.html"
effective_date: "2022-06-01"
automation_level: ["L1", "L2", "L3", "L4"]
