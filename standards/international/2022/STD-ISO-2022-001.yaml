summary_en: "Successor to ISO/PAS 21448:2019. The definitive international standard addressing safety issues arising from functional insufficiencies of the intended functionality or from reasonably foreseeable misuse — particularly ADAS and automated driving. Complements ISO 26262."
summary_cn: "ISO/PAS 21448:2019 的正式版，国际公认处理自动驾驶功能不足与合理可预见误用所引发安全问题的权威标准，尤其针对 ADAS 和自动驾驶。与 ISO 26262 互补。"
impact_note: "Core reference for any L2+ validation argument. Required reading for any OEM safety case. Zhang Yuxin's SOTIF consulting and ROAM incident taxonomy both reference this directly."
related_standards: ["ISO 26262", "ISO 34502", "ISO 21434", "UL 4600"]
