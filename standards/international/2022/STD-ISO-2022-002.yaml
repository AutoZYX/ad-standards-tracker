id: "STD-ISO-2022-002"
date: "2022-11-01"
org: "ISO"
org_full: "International Organization for Standardization"
jurisdiction: "international"
type: "standard"
status: "published"
title_en: "ISO 34502:2022 — Road vehicles — Test scenarios for automated driving systems — Scenario based safety evaluation framework"
title_cn: "ISO 34502:2022 道路车辆 自动驾驶系统测试场景 基于场景的安全评估框架"
url: "https://www.iso.org/standard/78951.html"
effective_date: "2022-11-01"
automation_level: ["L3", "L4"]
topics: ["testing", "sotif"]
summary_en: "Provides a framework for scenario-based safety evaluation of ADS. Defines categories of scenarios (nominal, critical, failure), structured methodology for scenario generation, and coverage arguments. Output of ISO TC22/SC33/WG9."
summary_cn: "为自动驾驶系统基于场景的安全评估提供框架。定义场景类别（正常、临界、失效）、场景生成的结构化方法论、覆盖性论证。由 ISO TC22/SC33/WG9 制定。"
impact_note: "Core standard for ADS validation. Referenced by most OEM safety cases and national standards (including China's draft GB/T scenario framework)."
related_standards: ["ISO 21448", "ISO 22737", "PEGASUS"]
contributor: "ROAM Core Team"
last_updated: "2026-04-16"
