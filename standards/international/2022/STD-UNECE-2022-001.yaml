summary_en: "First amendment to UN-R157 expanded ALKS scope from 60 km/h to 130 km/h and added provisions for lane changes. Original R157 (2021) was the first international regulation approving a Level 3 feature for mass production. Germany's Mercedes DRIVE PILOT was first approved under R157."
summary_cn: "UN-R157 首次修订将自动车道保持系统速度上限从 60 km/h 提升到 130 km/h 并增加变道条款。原版 R157（2021）是首个批准 L3 功能量产的国际法规。奔驰 DRIVE PILOT 是首个在 R157 框架下获批的产品。"
scope_en:
  - "Defines uniform approval provisions for Automated Lane Keeping Systems as a Level 3 automated-driving function."
  - "Amendment 01 expanded the regulatory envelope from low-speed ALKS toward highway-speed operation up to 130 km/h and lane-change-related provisions."
  - "Covers system performance, driver availability and transition demand, HMI, data storage for automated driving, cybersecurity/software-update interfaces, and type-approval documentation."
scope_cn:
  - "为自动车道保持系统（ALKS）这一 L3 自动驾驶功能规定统一型式批准要求。"
  - "第 01 次修订将法规边界从低速 ALKS 扩展到最高 130 km/h 的高速公路场景，并加入变道相关条款。"
  - "覆盖系统性能、驾驶员可用性与接管请求、HMI、自动驾驶数据存储、网络安全/软件更新接口和型式批准文件。"
exclusions_en:
  - "It is not a general L4 robotaxi or urban ADS regulation."
  - "It does not replace UN-R155, UN-R156, DSSAD work, or the emerging ADS GTR; it references adjacent obligations but remains ALKS-specific."
  - "It does not mean every L3 product is globally approved; contracting-party adoption, national implementation, and vehicle-specific approval still matter."
exclusions_cn:
  - "它不是通用 L4 Robotaxi 或城市 ADS 法规。"
  - "它不替代 UN-R155、UN-R156、DSSAD 工作或正在发展的 ADS GTR；它会衔接相关义务，但自身仍是 ALKS 专项法规。"
  - "它不意味着所有 L3 产品自动获得全球批准；缔约方采纳、各国实施和具体车型批准仍然关键。"
engineering_use_en:
  - "Use it as the baseline compliance reference for highway L3 product concepts, especially driver availability, transition demand, system limits, and data-recording evidence."
  - "Treat ALKS ODD, lane-change behavior, fail-safe response, and minimum-risk maneuver as the core engineering review items."
  - "Cross-map requirements to ISO 26262, ISO 21448, ISO 34502, UN-R155, UN-R156, and GB 44497 when building a market-entry safety case."
  - "For China or US programs, use it as an international benchmark, not as a substitute for local approval requirements."
engineering_use_cn:
  - "将其作为高速 L3 产品概念的基准合规参考，尤其关注驾驶员可用性、接管请求、系统边界和数据记录证据。"
  - "把 ALKS ODD、变道行为、失效安全响应和最小风险机动作为核心工程评审项。"
  - "构建市场准入安全案例时，应与 ISO 26262、ISO 21448、ISO 34502、UN-R155、UN-R156、GB 44497 做交叉映射。"
  - "对中国或美国项目，应把它作为国际基准，而不是替代本地准入要求。"
expert_note_en: >-
  UN-R157 is important less because it is "the L3 regulation" and more because it shows how a narrow
  ODD, driver fallback assumptions, data evidence, and type approval are tied together in a real
  mass-production framework.
expert_note_cn: >-
  UN-R157 的重要性不只是“它是 L3 法规”，而是它展示了一个量产准入框架如何把窄 ODD、驾驶员接管假设、数据证据和型式批准绑在一起。
impact_note: "Defines the baseline for any Level 3 highway autonomy globally. Chinese OEMs seeking European market entry for L3 features (e.g., Geely/NIO/HIMA) must comply."
