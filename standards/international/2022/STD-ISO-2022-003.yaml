summary_en: Final published version of SOTIF standard. Replaces the 2019 PAS. Addresses
  hazards from functional insufficiencies and reasonably foreseeable misuse that do
  not originate from E/E system failures — complementary to ISO 26262.
summary_cn: SOTIF 标准正式版，替代 2019 版 PAS。针对功能不足和可合理预见的误用导致的危害——这些危害并非源自 E/E 系统失效，与 ISO
  26262 互补。
impact_note: This is the globally referenced SOTIF standard. Required reading for
  any L3+ functional safety engineer.
