summary_en: >-
  Extends the original UN-R157 scope from 60 km/h to 130 km/h and adds automated lane-change
  capability. Strengthens Minimum Risk Manoeuvre (MRM) and Driver Availability Recognition System
  (DARS) requirements.
summary_cn: 将原 UN-R157 从 60 km/h 扩展到 130 km/h，并新增自动变道能力。加强了最小风险策略（MRM）和驾驶员可用性识别系统（DARS）要求。
