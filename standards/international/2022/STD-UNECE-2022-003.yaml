summary_en: Mandates detection/warning system for pedestrians and cyclists in front
  of commercial vehicles during low-speed starting. Addresses high fatality rate of
  vulnerable road users in urban logistics operations.
summary_cn: 强制商用车在低速起步时检测并警示前方行人和自行车。针对城市物流运营中弱势道路使用者（VRU）的高死亡率问题。
impact_note: Urban-delivery-focused regulation. Complements C-NCAP 2027 VRU scenarios.
