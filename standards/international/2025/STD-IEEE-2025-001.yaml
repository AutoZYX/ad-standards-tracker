summary_en: IEEE 3321-2024 provides recommended practice for applying the assumptions defined in IEEE 2846-2022 in safety-related models during ADS development, testing, and deployment.
summary_cn: IEEE 3321-2024 针对 ADS 开发、测试和部署阶段的安全相关模型，给出如何应用 IEEE 2846-2022 中“其他道路使用者可合理预见行为”假设的推荐实践。
impact_note: This is the missing companion to IEEE 2846 for safety-model application. It should be tracked with SOTIF, RSS-style safety models, scenario-based testing, and safety case evidence.
