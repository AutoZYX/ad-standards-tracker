title_en: "SAE J3016 — Revised: clarifications on L3 vs L4 distinction, remote-support definitions"
title_cn: "SAE J3016 修订版：厘清 L3 与 L4 区分、定义远程支持相关术语"
url: "https://www.sae.org/standards/content/j3016_202104/"
effective_date: "2025-05-01"
automation_level: ["L0", "L1", "L2", "L3", "L4", "L5"]
topics: ["teleoperation", "type_approval"]
summary_en: "In May 2025, SAE and ISO jointly released a significant update to J3016. Key revisions clarify the L3 vs L4 boundary (when can a system hand back control?), add definitions for remote-support functionality (teleoperation, tele-assistance), and provide new terms for ADS operability."
summary_cn: "2025 年 5 月，SAE 与 ISO 联合发布 J3016 重要更新。重点修订厘清 L3 与 L4 的边界（系统何时可以交还控制权）、增加远程支持功能定义（远程驾驶、远程辅助）、新增自动驾驶系统可操作性术语。"
impact_note: "Reinforces teleoperation as core L4 capability. Directly affects Robotaxi operator compliance claims (Waymo, Cruise, Pony.ai, Apollo Go). Aligns terminology with Chinese GB/T 44373."
related_standards: ["SAE J3131", "SAE J3164", "GB/T 44373"]
contributor: "ROAM Core Team"
