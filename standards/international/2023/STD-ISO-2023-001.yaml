summary_en: Defines a framework for scenario-based safety evaluation of automated
  driving systems. Specifies risk acceptance criteria, scenario categorization, test
  coverage methodology.
summary_cn: 定义自动驾驶系统基于场景的安全评估框架。规定了风险接受准则、场景分类和测试覆盖方法论。
impact_note: Key reference for scenario-driven safety validation; complements ISO
  21448 and aligns with NATM (New Assessment/Test Method) at UNECE WP.29.
