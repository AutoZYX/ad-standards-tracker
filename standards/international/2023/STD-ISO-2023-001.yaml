title_en: ISO 34502:2022 — Road vehicles — Test scenarios for automated driving systems
  — Scenario-based safety evaluation framework
title_cn: ISO 34502:2022 道路车辆 — 自动驾驶系统测试场景 — 基于场景的安全评估框架
url: https://www.iso.org/standard/78951.html
automation_level:
