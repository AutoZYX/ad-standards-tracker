title_en: IEEE 2846-2022 — Standard for Assumptions in Safety-Related Models for Automated
  Driving Systems
title_cn: IEEE 2846-2022 自动驾驶系统安全相关模型假设标准
url: https://standards.ieee.org/ieee/2846/10831/
automation_level:
- L3
- L4
topics:
- functional_safety
- sotif
- testing
summary_en: Establishes a formal rulebook for assumptions used in safety-related models
  (e.g., other road users' behavior) in ADS. Enables transparent, testable, and shareable
  safety-envelope definitions.
summary_cn: 为 ADS 安全相关模型（如其他道路使用者行为）中的假设建立正式规则手册。支持透明、可测试、可共享的安全包线定义。
impact_note: 'Origin: Intel/Mobileye RSS proposal, formalized by IEEE. Key for regulatory
  acceptance of computational safety models.'
related_standards:
- ISO 21448
- ISO 34502
