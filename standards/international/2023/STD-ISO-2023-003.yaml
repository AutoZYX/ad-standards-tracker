title_en: >-
  ISO 34503:2023 — Road vehicles — Test scenarios for automated driving systems — Taxonomy for
  operational design domain
title_cn: ISO 34503:2023 道路车辆 自动驾驶系统测试场景 — 运行设计域（ODD）分类
