summary_en: Draft standard defining V&V framework for ADS. Complements IEEE 2846 (safety assumptions) with concrete verification
  test and validation evidence requirements. Working group chaired by Mobileye and Intel.
summary_cn: 起草中的自动驾驶系统验证与确认（V&V）框架标准，与 IEEE 2846（安全假设）互补，规定具体验证测试和确认证据要求。工作组由 Mobileye 和 Intel 主持。
impact_note: Expected publication 2026. Will be a key reference for US ADS safety cases.
