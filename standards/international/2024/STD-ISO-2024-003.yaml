summary_en: >-
  Publicly available specification for road-vehicle safety and artificial intelligence. It provides
  guidance for using AI in safety-related E/E systems and connects AI-specific development concerns
  with established automotive safety engineering practices.
summary_cn: >-
  面向道路车辆“安全与人工智能”的公开可用规范，针对安全相关 E/E 系统中 AI 的使用给出开发和安全工程指导，并把 AI 特有问题与传统汽车安全开发流程衔接起来。
impact_note: >-
  Use this record as the AI-safety companion to ISO 26262 and ISO 21448. It should be cited as
  ISO/PAS 8800:2024, not ISO/SAE 8800, based on the official ISO catalog.
