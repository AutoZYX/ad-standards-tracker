summary_en: >-
  Published ISO standard defining functional requirements, specifications, and communication
  protocol for monitoring and controlling test objects used in active safety and
  automated/autonomous vehicle testing. Replaces ISO/TS 22133:2023.
summary_cn: 已发布 ISO 标准，规定主动安全与自动/自主车辆测试中测试对象的监测、控制功能要求、规范和通信协议。替代 ISO/TS 22133:2023。
impact_note: >-
  Important for proving-ground and scenario-based testing because it enables interoperable control
  of test targets from multiple vendors.
