summary_en: Formal WP.29 review document for the proposed UN Global Technical Regulation on ADS. The proposal establishes harmonized ADS safety provisions for vehicle categories 1 and 2, including safety management, multi-pillar validation, safety case, post-deployment monitoring, and reporting.
summary_cn: 面向 WP.29 正式审议的自动驾驶系统全球技术法规提案。该提案为 1 类和 2 类车辆的 ADS 建立全球协调安全要求，覆盖安全管理、多支柱验证、安全论证、部署后监测和报告。
impact_note: Potentially the most important international ADS regulatory milestone after UN-R157. As of 2026-05-09 it is under formal WP.29 review, with adoption discussions expected to shape L3/L4 type approval globally.
