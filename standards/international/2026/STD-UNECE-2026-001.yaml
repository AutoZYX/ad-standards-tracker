summary_en: UNECE GRVA adopted a draft Global Technical Regulation for Automated Driving Systems during its January 2026 session. The draft introduces a safety-case-based framework for ADS approval, including safety management, validation evidence, in-service monitoring, and DSSAD-related provisions.
summary_cn: UNECE GRVA 在 2026 年 1 月会议上通过自动驾驶系统全球技术法规草案。草案建立基于安全论证的 ADS 准入框架，覆盖安全管理、验证证据、在用监测和 DSSAD 等要求。
impact_note: Potentially the most important international ADS regulatory milestone after UN-R157. Formal WP.29 adoption is expected to shape L3/L4 type approval discussions globally.
