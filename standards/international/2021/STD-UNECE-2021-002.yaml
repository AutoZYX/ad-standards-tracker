title_en: UN Regulation No. 156 — Software Update and Software Update Management System
title_cn: UN-R156 软件升级与软件升级管理体系
url: >-
  https://unece.org/transport/documents/2021/03/standards/un-regulation-no-156-software-update-and-software-update
effective_date: '2022-07-01'
automation_level:
  - L2
