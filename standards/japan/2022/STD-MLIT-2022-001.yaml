id: STD-MLIT-2022-001
date: '2022-04-20'
org: MLIT Japan
org_full: Ministry of Land, Infrastructure, Transport and Tourism (Japan)
jurisdiction: japan
type: regulation
status: in_force
title_en: Road Transport Vehicle Act — Level 4 Service Framework
title_cn: 道路运输车辆法 — L4 服务框架
url: https://www.mlit.go.jp/en/jidosha/anzen/anzen.html
automation_level:
- L4
topics:
- type_approval
- operations
summary_en: Amended Road Transport Vehicle Act enabling Level 4 services in Japan.
  Introduces 'specific automated driving' licensing category and prefectural approval
  process for L4 operators (e.g., Fukui's Eiheiji pilot).
summary_cn: 修订的道路运输车辆法支持日本 L4 服务落地。引入'特定自动驾驶'许可类别和 L4 运营商的都道府县审批流程（如福井县永平寺试点）。
impact_note: Enabled Japan's first formal L4 deployments (bus lines, last-mile shuttles).
related_standards:
- UN-R157
last_updated: '2026-04-16'
