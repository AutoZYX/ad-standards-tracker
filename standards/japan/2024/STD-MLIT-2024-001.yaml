summary_en: >-
  Defines socially acceptable safety levels for Japanese L4 passenger and goods services. Formalizes
  type approval criteria building on JAMA and JASIC industry input.
summary_cn: 定义日本 L4 载人/载货服务的'社会可接受安全水平'，结合 JAMA 与 JASIC 产业输入，形成型式认证正式标准。
impact_note: >-
  Japan's answer to UN-R157 for L4 services. Enables commercialization of Robotaxi / AutoBus in
  Japan.
