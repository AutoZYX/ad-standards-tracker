summary_en: Japan's inter-ministerial mobility strategy targeting 50 locations with L4 services by 2025 and 100 by 2027. Specifies
  funding, type approval pathways, operational coordination between METI and MLIT.
summary_cn: 日本多部委联合交通出行战略，目标 2025 年 50 个地点、2027 年 100 个地点部署 L4 服务。明确资金、型式认证路径、METI 与 MLIT 协作方式。
impact_note: Frames Japan's national commitment to L4 commercialization. Triggered 2024 infrastructure deployments (Tokyo-Nagoya
  AV lanes).
