summary_en: 2025 update of Japan's mobility roadmap. Maintains 100-location target for 2027, clarifies funding mechanisms,
  introduces a collaboration framework with local municipalities.
summary_cn: 日本交通出行路线图 2025 更新版，维持 2027 年 100 个地点部署目标，明确资助机制，引入与地方政府的协作框架。
impact_note: Signals Japan's commitment to L4 beyond Tokyo-Nagoya corridor. Attracts Chinese and US technology providers (Tier
  Ⅳ, Waymo, Pony.ai).
