summary_en: >-
  Chongqing-based consumer assessment scheme for ICVs. Tests AEB, ACC, LKA, TJP (traffic jam pilot),
  HWP (highway pilot), parking assist. Annual public rankings influence Chinese consumer purchases.
summary_cn: 重庆主办的智能网联汽车消费者测评体系，测试 AEB、ACC、LKA、TJP（交通拥堵辅助）、HWP（高速公路辅助）、自动泊车。年度公开排名影响中国消费者选车。
impact_note: >-
  Considered the most rigorous Chinese public ICV assessment. Huawei HIMA, Tesla Model Y, Li Auto L9
  all tested.
