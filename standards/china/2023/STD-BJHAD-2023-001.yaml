summary_en: Third-phase expansion of Beijing's HAD zone to 600 km² including Beijing
  Daxing Airport access. Permits commercial fare-charging Robotaxi operations for
  Baidu Apollo, Pony.ai, others.
summary_cn: 北京高级别自动驾驶示范区三期扩展至 600 平方公里，含大兴机场接入。允许百度 Apollo、小马智行等开展商业化收费 Robotaxi 运营。
impact_note: Single largest urban AV pilot zone globally by area. Directly enables
  commercial Robotaxi revenue.
