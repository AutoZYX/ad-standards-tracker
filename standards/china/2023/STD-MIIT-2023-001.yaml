summary_en: >-
  Joint MIIT/MoT/MPS/MOHURD notice launching the national L3/L4 ICV access and on-road operation
  pilot. Defines five stages: application, access, pilot operation, assessment, confirmation.
summary_cn: 工信部、交通运输部、公安部、住建部联合发布，启动 L3/L4 智能网联汽车准入和上路通行试点。定义五阶段：申请、准入、试点、评估、确认。
impact_note: >-
  Opened regulatory pathway for mass production L3 in China. Enabled BMW-Brilliance L3 in Shanghai
  2023-12 and broader OEM applications in 2024.
