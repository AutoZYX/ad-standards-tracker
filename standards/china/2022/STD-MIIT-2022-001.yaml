summary_en: MIIT policy strengthening ICV type approval. Requires OTA update approval, cybersecurity reporting, safety incident
  reporting, data security compliance. First comprehensive Chinese regulatory framework for ICV market access.
summary_cn: 工信部加强智能网联汽车准入管理的综合性政策，要求 OTA 升级审批、网络安全报备、安全事件报告、数据安全合规。是中国首个综合性智能网联汽车市场准入监管框架。
impact_note: Foundational regulation cited by every subsequent GB/T ICV standard. Precedent for 2026 Safety Events Data Interaction
  draft.
