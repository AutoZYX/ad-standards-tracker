summary_en: >-
  Beijing launched China's first commercial pilot for driverless mobility services in the
  high-level automated driving demonstration zone, allowing qualified Robotaxi operators to charge
  fares in designated areas.
summary_cn: >-
  北京高级别自动驾驶示范区启动国内首个无人化出行服务商业化试点，允许符合条件的 Robotaxi 企业在指定区域开展收费运营。
impact_note: >-
