summary_en: >-
  First round of public consultation (2025-09-17 through 2025-11-15) on the mandatory GB standard
  for L2 combined driving assistance systems. Introduces classification into basic single-lane,
  basic multi-lane, and navigation combined driving assistance categories. Establishes a "triple
  safety protection" framework covering product performance, safety requirements, and usage
  specifications.
summary_cn: >-
  L2 组合驾驶辅助强制性国标首轮征求意见（2025-09-17 至
  2025-11-15）。引入基础单车道、基础多车道、导航组合驾驶辅助三类分类。建立覆盖产品性能、安全要求、使用规范的「三重安全防护」框架。
impact_note: 首次系统性监管 L2 NOA 产品的关键文件。本轮意见经整合后形成 2026-04-16 发布的报批稿（见 MIIT-2026-001）。新华社、stdaily 等主流媒体均作深度报道。
