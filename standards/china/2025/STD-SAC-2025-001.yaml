summary_en: >-
  Draft national standard for teleoperation of ICVs. Specifies latency targets (<200ms), video
  quality (4K, HDR), operator training, fallback procedures. Aligns with UNECE GRVA work and IEEE
  P3128.
summary_cn: 智能网联汽车远程操作国标征求意见稿，规定延迟目标（<200ms）、视频质量（4K、HDR）、操作员培训、回退流程。与 UNECE GRVA 工作和 IEEE P3128 对齐。
impact_note: >-
  Essential for commercial Robotaxi in China. Affects Apollo Go, Pony.ai, WeRide operational
  playbooks.
related_standards:
  - IEEE P3128
  - ISO 4448
