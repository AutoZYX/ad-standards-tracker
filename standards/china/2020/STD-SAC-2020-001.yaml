summary_en: Mandatory China EDR standard. Defines minimum data elements, trigger conditions,
  15-second pre-crash + 5-second post-crash retention. Mandatory for all M1-class
  passenger cars since 2022-01-01.
summary_cn: 中国 EDR 强制性国标。规定最小数据元素、触发条件、碰撞前 15 秒 + 碰撞后 5 秒数据保存。2022-01-01 起对所有 M1 类乘用车强制。
impact_note: Precursor to GB 44497 (DSSAD). EDR data becoming key evidence in AD-related
  accident investigations.
related_standards:
- UN-R160
- GB 44497-2024
