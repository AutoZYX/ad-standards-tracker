title_en: GB 39732-2020 — Motor vehicle event data recorder
title_cn: GB 39732-2020 汽车事件数据记录系统
url: https://openstd.samr.gov.cn/bzgk/gb/newGbInfo?hcno=5FE8B010074DB95C5AE51A5A796C9F12
effective_date: '2022-01-01'
automation_level:
- L0
