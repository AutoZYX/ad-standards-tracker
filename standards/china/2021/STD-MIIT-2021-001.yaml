summary_en: >-
  MIIT policy strengthening ICV access management. Requires manufacturers to manage data security,
  cybersecurity, software updates, functional safety, SOTIF, product quality, and production
  consistency.
summary_cn: 工信部加强智能网联汽车生产企业及产品准入管理的政策文件，要求企业加强汽车数据安全、网络安全、软件升级、功能安全和预期功能安全管理，保证产品质量和生产一致性。
impact_note: >-
  Foundational regulation cited by every subsequent GB/T ICV standard. Precedent for 2026 Safety
  Events Data Interaction draft.
