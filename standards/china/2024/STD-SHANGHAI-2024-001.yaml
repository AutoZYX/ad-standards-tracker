summary_en: Pudong-specific regulation enabling driverless ICV operation. Establishes
  safety officer responsibilities, mandatory insurance requirements, operational domain
  specifications.
summary_cn: 浦东新区针对无驾驶人智能网联汽车的专项规定。明确安全员职责、强制保险要求、运营设计域规范。
impact_note: First provincial-level regulation with explicit 'driverless' language.
  Enabled AutoX and WeRide driverless pilots in Lingang.
