summary_en: Approves first 9 consortia (OEM + city + operator) for the L3/L4 pilot program. Includes BYD-Shenzhen-Pony.ai,
  NIO-Shanghai-NIO, Changan-Chongqing, BAIC-Beijing, SAIC-Shanghai, Dongfeng-Wuhan, GAC-Guangzhou, Yutong-Zhengzhou, Beijing-Yutong.
summary_cn: 公布 L3/L4 首批 9 个试点联合体（车企+城市+运营方）名单，涵盖比亚迪-深圳-小马智行、蔚来-上海-蔚来、长安-重庆、北汽-北京、上汽-上海、东风-武汉、广汽-广州、宇通-郑州、北京-宇通。
impact_note: Marks transition from testing to commercial deployment. Chinese L3/L4 market access now has clear regulatory
  anchor.
