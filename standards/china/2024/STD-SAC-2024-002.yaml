topics:
  - data_recording
  - cybersecurity
summary_en: >-
  Mandatory GB standard for DSSAD (Data Storage System for Automated Driving). Mirrors UNECE R157
  DSSAD requirements but adapted to Chinese regulatory context. Specifies event triggers, minimum
  data elements, retention, authentication, and read-out protocols.
summary_cn: DSSAD（自动驾驶数据存储系统）强制性国标。参考 UNECE R157 DSSAD 要求但适配中国监管语境。规定事件触发、最小数据元素、保存时间、认证及读取协议。
impact_note: L3/L4 车辆在中国获得准入的必要条件。2026-01-01 对新准入车型强制实施。
related_standards:
  - UN-R157
  - UN-R160
  - GB 39732
