summary_en: Draft mandatory GB standard defining performance and test requirements for L2 combined ADAS in passenger cars.
  Consultation period closed Q1 2025; expected enactment 2026.
summary_cn: 强制性 GB 国标草案，定义乘用车 L2 组合辅助驾驶系统的性能与试验要求。征求意见于 2025 年 Q1 截止，预计 2026 年实施。
impact_note: Will dramatically raise bar for L2 ADAS certification in China. Affects all Chinese OEMs marketing 'NoA', 'NGP',
  'NCA' features.
