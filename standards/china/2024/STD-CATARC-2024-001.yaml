summary_en: C-NCAP expands beyond passive/active safety into L2 assisted driving assessment. Protocol tests lane keeping,
  adaptive cruise, AEB at different speeds, NoA (Navigate on Autopilot) handover behavior.
summary_cn: C-NCAP 从被动/主动安全扩展到 L2 辅助驾驶测评。方案测试车道保持、自适应巡航、不同速度下的 AEB、NoA 接管行为。
impact_note: Chinese counterpart to Euro NCAP Assisted Driving protocol. Affects marketing of L2+ systems by Chinese OEMs
  (BYD, NIO, XPeng, Li Auto, Huawei HIMA).
