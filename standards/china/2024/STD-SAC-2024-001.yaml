summary_en: China's foundational national standard for ICV terminology. Defines automated driving levels (aligned with SAE
  J3016), ADS, ADAS, remote operations, minimum risk maneuver, and other core terms used across all subsequent GB and GB/T
  ICV standards.
summary_cn: 中国智能网联汽车术语的基础性国家标准，定义自动驾驶等级（与 SAE J3016 对齐）、ADS、ADAS、远程运营、最小风险策略等后续所有 GB/GB/T 智能网联汽车标准所引用的核心术语。
impact_note: All Chinese ICV standards reference this vocabulary. Sole source for regulatory automation-level classification
  in China.
