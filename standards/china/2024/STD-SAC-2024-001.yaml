title_en: GB/T 44373-2024 — Intelligent Connected Vehicles — Terms and Definitions
title_cn: GB/T 44373-2024 智能网联汽车 术语和定义
url: https://openstd.samr.gov.cn/bzgk/gb/newGbInfo?hcno=E5D49F73A1226AB06CE60E7BD47A2BDC
