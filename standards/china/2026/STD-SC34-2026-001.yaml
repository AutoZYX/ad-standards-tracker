summary_en: >-
  Notice of April 17, 2026 Beijing meeting to discuss the draft GB/T Technical Specification on ICV
  Safety Events Data Interaction and Management System. Draft defines 14 event type codes
  (0x01-0x0E), enterprise-to-national platform reporting architecture, SM2/SM4 cryptographic
  requirements.
summary_cn: >-
  2026 年 4 月 17 日北京会议通知，讨论《智能网联汽车 安全事件数据交互与管理系统技术规范》国标草案。草案定义 14
  种事件编码（0x01-0x0E）、企业平台→国家平台上报架构、SM2/SM4 国密加密要求。
impact_note: >-
