summary_en: 'Report-for-Approval draft published 2026-04-16 for 7-day consultation
  (through 2026-04-22). Covers basic single-lane, basic multi-lane, and navigation
  combined driving assistance systems. Specifies usage instructions, driver training,
  driver state monitoring, system disabling after repeated hand/eye disengagement
  events. Proposed enforcement: 2027-01-01 for all new type approvals.'
summary_cn: 2026 年 4 月 16 日起公开征求报批稿意见，截止 4 月 22 日（仅 7 天）。覆盖基础单车道、基础多车道、导航组合驾驶辅助三类系统，规定使用说明、驾驶员培训、驾驶员状态监测、脱手脱眼多次后系统禁用等要求。拟
  2027-01-01 对所有新申请准入的车型强制实施。
impact_note: ⚠️[请核实：报批稿文号与实施日期细节]。是继 2025-02 征求意见稿后的第二轮征询。对比亚迪、小鹏、蔚来、理想、华为鸿蒙智行、小米等所有
  L2 NOA 产品有直接合规影响 —— 系统自动禁用机制将显著改变现有产品体验。
