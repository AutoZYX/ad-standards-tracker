summary_en: 'Report-for-Approval draft of the mandatory GB standard for L2 combined
  driving assistance. 2nd public consultation period: 2026-04-16 to 2026-04-22. Covers
  basic single-lane, basic multi-lane, and navigation combined driving assistance
  systems. Specifies usage instructions, driver training, driver state monitoring,
  and mandatory system disabling after repeated hand/eye disengagement events. Proposed
  enforcement: 2027-01-01 for all new type approvals. First consultation round was
  2025-09-17 to 2025-11-15.'
summary_cn: L2 组合驾驶辅助强制性国标报批稿。第二轮公开征求意见期：2026-04-16 至 2026-04-22。覆盖基础单车道、基础多车道、导航组合驾驶辅助三类系统，规定使用说明、驾驶员培训、驾驶员状态监测、脱手脱眼多次后系统自动禁用等要求。拟
  2027-01-01 对所有新申请准入的车型强制实施。首轮征求意见稿于 2025-09-17 至 2025-11-15 期间公开。
impact_note: 报批稿阶段尚未成为正式强制性国家标准，但若按建议日期实施，将对所有 L2 组合驾驶辅助/NOA 产品产生直接准入影响，尤其是 DMS、误用防护和系统禁用机制。
