summary_en: >-
  DfT consultation on secondary legislation implementing the 2024 AV Act. Defines ASDE application
  procedures, insurance requirements, in-use enforcement, Automated Passenger Service (APS)
  framework.
summary_cn: 交通部对实施 2024 年《自动驾驶汽车法案》附属立法的征求意见。明确 ASDE 申请程序、保险要求、使用期监管、APS（自动载客服务）框架。
impact_note: >-
  Determines when UK Robotaxi services can launch. Expected to open market to Waymo, Wayve, Oxbotica
  (now Oxa) post 2026.
