summary_en: UK government call for evidence on safety standards for automated vehicles. Section 2 of the Automated Vehicles Act 2024 requires the Secretary of State to prepare a Statement of Safety Principles that will support authorization, in-use regulation, and annual safety assessment.
summary_cn: 英国政府围绕自动驾驶车辆安全标准开展征求证据。《2024 年自动驾驶汽车法》第 2 条要求交通大臣制定安全原则声明，该声明将用于授权、在用监管和年度安全评估。
impact_note: The consultation is not itself binding, but it is a high-value signal for how the UK will translate the statutory “careful and competent human driver” threshold into authorization and in-use monitoring.
