id: STD-UK-2024-001
date: '2024-05-20'
org: UK CCAV
org_full: UK Centre for Connected and Autonomous Vehicles
jurisdiction: uk
type: regulation
status: in_force
title_en: UK Automated Vehicles Act 2024
title_cn: 英国 2024 年自动驾驶汽车法案
url: https://www.legislation.gov.uk/ukpga/2024/10/enacted
effective_date: '2024-05-20'
automation_level:
- L3
- L4
topics:
- type_approval
- operations
summary_en: Creates Authorised Self-Driving Entity (ASDE) regime. Shifts liability from driver to ASDE for self-driving vehicles.
  Defines 'user-in-charge' and 'no-user-in-charge' scenarios and establishes safety regulator.
summary_cn: 建立'授权自动驾驶实体（ASDE）'制度。在自动驾驶状态下将法律责任从驾驶员转移到 ASDE。定义'有责任用户'与'无责任用户'场景，并设立安全监管机构。
impact_note: Most comprehensive legal framework for L4 operation outside China. Provides ADSE template adopted/studied by
  Japan, Korea.
related_standards:
- BSI PAS 1881
- UN-R157
